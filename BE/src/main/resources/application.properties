spring.application.name=zigma

# application-secret.properties
spring.config.import=optional:application-secret.properties

# Datasource
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# JWT
jwt.secret = ${JWT_SECRET_KEY}
jwt.access.expiration = ${JWT_ACCESS_EXPIRATION}
jwt.refresh.expiration = ${JWT_REFRESH_EXPIRATION}

#  Frontend
app.oauth2.front-redirect-uri.local=http://localhost:5173/oauth/callback
app.oauth2.front-redirect-uri.deploy=https://z-igma.vercel.app/oauth/callback
app.oauth2.front-redirect-uri.ios=zigma://oauth/callback

# Web Push
web-push.vapid-public-key=${WEB_PUSH_VAPID_PUBLIC_KEY:}
web-push.vapid-private-key=${WEB_PUSH_VAPID_PRIVATE_KEY:}
web-push.vapid-subject=${WEB_PUSH_VAPID_SUBJECT:mailto:admin@zigma.com}
web-push.ttl-seconds=${WEB_PUSH_TTL_SECONDS:3600}

# KAKAO
#   Registration 설정
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
#   Redirect URI 설정
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
#   Provider 설정
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize?prompt=login
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# NAVER
#   Registration 설정
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=email,nickname,profile_image
#   Redirect URI 설정
spring.security.oauth2.client.registration.naver.redirect-uri=https://3.35.68.247.nip.io/login/oauth2/code/naver
#   Provider 설정
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize?auth_type=reauthenticate
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response
